<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>URL Blocked</title>
        <link rel="icon" type="image/svg+xml" href="../assets/gauntlet.svg">
        <link rel="stylesheet" href="blocked.css">
    </head>

    <body>
        <div class="blocked-container">
            <a href="#" id="settings-link" class="settings-link" title="Manage Sites & Settings">
                <svg class="settings-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                </svg>
            </a>
            <img class="blocked-icon" src="../assets/gauntlet.svg" alt="Infinity Gauntlet">
            <h1>URL Blocked</h1>
            <p class="blocked-url" id="blocked-url"></p>
            <p class="blocked-message">
                This URL has been blocked by the URL Blocker extension.
            </p>
            <div class="bypass-section" id="bypass-section">
                <button class="bypass-button" id="bypass-button">
                    <svg class="button-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                        <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Allow for 10 minutes
                </button>
                <p class="bypass-info">You'll be redirected to the site. The block will resume after 10 minutes.</p>
            </div>
        </div>
        <script src="utils/ui-helpers.js"></script>
        <script src="blocked.js"></script>
    </body>

</html>
