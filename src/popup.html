<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>URL Blocker - The Infinity Gauntlet</title>
        <link rel="icon" type="image/svg+xml" href="../assets/gauntlet.svg">
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="container">
            <header>
                <img class="header-icon" src="../assets/gauntlet.svg" alt="Infinity Gauntlet">
                <h1>URL Blocker</h1>
            </header>

            <div class="quick-block-section">
                <label for="url-input" class="input-label">Block this URL:</label>
                <input type="text" id="url-input" placeholder="Enter URL to block">
                <button id="block-button" class="block-button">
                    <svg class="button-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                            stroke="currentColor" stroke-width="2" />
                        <path d="M4.93 4.93L19.07 19.07" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                    Block Site
                </button>
            </div>

            <div class="error-message" id="error-message"></div>

            <div class="actions">
                <button id="get-current-button" class="secondary-button">
                    <svg class="button-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                        <path
                            d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                            stroke="currentColor" stroke-width="2" />
                    </svg>
                    Get Current URL
                </button>
                <a href="#" id="settings-link" class="settings-link">
                    <svg class="button-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                        <path d="M12 1v6m0 6v6M23 12h-6m-6 0H1" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <path
                            d="M18.36 5.64l-4.24 4.24m-4.24 4.24l-4.24 4.24M18.36 18.36l-4.24-4.24m-4.24-4.24L5.64 5.64"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    Manage Sites & Settings
                </a>
            </div>
        </div>

        <script src="utils/ui-helpers.js"></script>
        <script src="popup.js"></script>
    </body>

</html>
